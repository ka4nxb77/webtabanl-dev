<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - Proje</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Web Tabanlı Programlama Dönem Projesi</h1>
    </header>

    <nav>
        <a href="index.html">Ana Sayfa</a>
        <a href="kayit.html" class="aktif">Kayıt Ol</a>
        <a href="oyun.html">Eğlenceli Oyun</a>
    </nav>

    <main class="icerik">
        <h2>Hesap Oluştur</h2>
        <form class="kayit-formu" onsubmit="alert('Kayıt başarılı!'); return false;">
            <div class="form-grup">
                <label for="email">Gmail Adresiniz:</label>
                <input type="email" id="email" placeholder="ornek@gmail.com" required>
            </div>
            
            <div class="form-grup">
                <label for="sifre">Şifre:</label>
                <input type="password" id="sifre" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-gonder">Kayıt Ol</button>
        </form>
    </main>

</body>
</html>
